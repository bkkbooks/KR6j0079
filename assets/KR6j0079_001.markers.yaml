  - {type: variant, offset: 3376, length: 1, content: 以, 甲: '', 乙: 次}
  - {type: variant, offset: 3377, length: 204, content: '施十方天食，應用雜粥，所謂粳米油麻菉豆相＝想【宋】【元】相【大】，想【宋】【元】相想

      和煮，令極清淨香美，盛一器中，每座先置一淨葉，循環率＝㪻【乙】【丙】＊率【大】＊，㪻【乙】【丙】＊率㪻置葉上。先以淨瓶盛香水，即瀉＝寫【宋】【元】瀉【大】，寫【宋】【元】瀉寫少香水於葉上以獻。次以右手中無名二指，彈少塗香以獻。次獻一花置之於座。次獻燒香，以爐焚香於座前，獻諸座同此一爐。次率㪻一杓粥，置葉上以獻。次用小蠟燭或紙燭以獻，便插粥上。從香水至燭，各以本真言加持三遍，每位從水至燭獻畢，然向其次，其燭作意獻，諸位未遍已來，不用令滅，須助伴或驅使數人各執一物以供事，若一一自取，即燭必不終事。每位於薩嚩訶上，加所求願語。', 甲: ''}
